name: EmDash CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Typecheck
      run: pnpm typecheck
      
    - name: Lint
      run: pnpm lint:quick
      
    - name: Build
      run: pnpm build
